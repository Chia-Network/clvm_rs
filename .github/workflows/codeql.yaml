name: CodeQL

on:
  push:
    branches:
      - main
      - dev
    tags:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  analyze:
    name: Analyze
    strategy:
      fail-fast: false
      matrix:
        include:
          language: [rust, actions]
    runs-on: [ubuntu-latest]
  steps:
    - uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
